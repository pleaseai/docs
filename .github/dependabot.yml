version: 2
updates:
  # Bun workspaces: the root entry covers workspace member package.json
  # files too (apps/*, packages/*) — no per-directory entries needed.
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns:
          - "*"

version: 2
updates:
  - package-ecosystem: bun
    directories:
      - "/"
      - "/apps/docs"
      - "/packages/layer"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns:
          - "*"
